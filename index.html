<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Slide Deck Generator v2</title>
    <style>
        :root { --gold: #d4af37; --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: var(--card); padding: 25px; border-radius: 12px; border: 1px solid #333; }
        .toolbar { display: flex; gap: 10px; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #333; }
        .slide-item { background: #252525; border-left: 4px solid var(--gold); padding: 20px; margin-bottom: 20px; border-radius: 4px; position: relative; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 10px; }
        label { display: block; font-size: 11px; color: var(--gold); text-transform: uppercase; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 10px; background: #121212; border: 1px solid #444; color: white; border-radius: 6px; box-sizing: border-box; }
        button { cursor: pointer; padding: 10px 18px; border-radius: 6px; border: none; font-weight: bold; transition: opacity 0.2s; }
        .btn-add { background: #2ecc71; color: white; margin-top: 10px; }
        .btn-gen { background: var(--gold); color: black; }
        .btn-del { background: #e74c3c; color: white; position: absolute; top: 10px; right: 10px; padding: 5px 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Presentation Builder (Multi-Screen)</h2>
    <div class="toolbar">
        <button onclick="document.getElementById('fileIn').click()" style="background:#3498db; color:white;">Import JSON</button>
        <button onclick="exportJSON()" style="background:#555; color:white;">Export JSON</button>
        <button class="btn-gen" onclick="generateHTML()">Generate Presentation</button>
        <input type="file" id="fileIn" class="hidden" accept=".json" onchange="importJSON(event)">
    </div>

    <div id="slide-container"></div>
    <button class="btn-add" onclick="addSlide()">+ Add New Slide</button>
</div>

<script>
    let slides = [];

    // Utility to convert hh:mm:ss to seconds
    function hmsToSeconds(hms) {
        const parts = hms.split(':').map(Number);
        if (parts.length === 3) return (parts[0] * 3600) + (parts[1] * 60) + parts[2];
        if (parts.length === 2) return (parts[0] * 60) + parts[1];
        return parts[0] || 0;
    }

    function addSlide(data = {}) {
        slides.push({
            eyebrow: data.eyebrow || "Section Header",
            title: data.title || "New Slide",
            description: data.description || "",
            points: Array.isArray(data.points) ? data.points.join('\n') : (data.points || ""),
            quote: data.quote || "",
            youtubeId: data.youtubeId || "wQR79fVFSy8",
            start: data.start || "00:00:00",
            end: data.end || "00:01:00"
        });
        render();
    }

    function update(idx, field, val) { slides[idx][field] = val; }
    function remove(idx) { slides.splice(idx, 1); render(); }

    function render() {
        const div = document.getElementById('slide-container');
        div.innerHTML = slides.map((s, i) => `
            <div class="slide-item">
                <button class="btn-del" onclick="remove(${i})">Delete</button>
                <div class="grid">
                    <div><label>Eyebrow</label><input onchange="update(${i},'eyebrow',this.value)" value="${s.eyebrow}"></div>
                    <div><label>Title</label><input onchange="update(${i},'title',this.value)" value="${s.title}"></div>
                </div>
                <label style="margin-top:10px">Description</label>
                <textarea onchange="update(${i},'description',this.value)">${s.description}</textarea>
                <label>Points (one per line)</label>
                <textarea onchange="update(${i},'points',this.value)">${s.points}</textarea>
                <label>Quote</label>
                <input onchange="update(${i},'quote',this.value)" value="${s.quote}">
                <div class="grid">
                    <div><label>YouTube ID</label><input onchange="update(${i},'youtubeId',this.value)" value="${s.youtubeId}"></div>
                    <div><label>Start (hh:mm:ss)</label><input onchange="update(${i},'start',this.value)" value="${s.start}" placeholder="00:00:00"></div>
                    <div><label>End (hh:mm:ss)</label><input onchange="update(${i},'end',this.value)" value="${s.end}" placeholder="00:00:00"></div>
                </div>
            </div>
        `).join('');
    }

    function exportJSON() {
        const blob = new Blob([JSON.stringify(slides, null, 2)], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "presentation_data.json";
        a.click();
    }

    function importJSON(e) {
        const reader = new FileReader();
        reader.onload = (f) => { slides = JSON.parse(f.target.result); render(); };
        reader.readAsText(e.target.files[0]);
    }

function generateHTML() {
    const slidesContent = slides.map((s, i) => {
        const pList = (Array.isArray(s.points) ? s.points : s.points.split('\n'))
            .filter(p => p.trim())
            .map(p => `<li>${p}</li>`)
            .join('');

        const sTime = hmsToSeconds(s.start);
        const eTime = hmsToSeconds(s.end);
        const ytUrl = s.youtubeId ? `https://www.youtube.com/watch?v=${s.youtubeId}&t=${sTime}s` : null;

        // Check if video exists
        const hasVideo = s.youtubeId && s.youtubeId.trim() !== "";

        return `
    <div class="slide-screen ${i === 0 ? 'active' : ''}" id="slide-${i}">
        <div class="slide-content ${!hasVideo ? 'no-video' : ''}">
            <div class="panel">
                <div class="eyebrow">${s.eyebrow}</div>
                <h1>${s.title}</h1>
                <p>${s.description}</p>
                <ul>${pList}</ul>
                ${s.quote ? `<div class="quote">“${s.quote}”</div>` : ''}
            </div>
            
            ${hasVideo ? `
            <div class="panel">
                <div class="video-container">
                    <div class="iframe-wrap">
                        <iframe src="https://www.youtube.com/embed/${s.youtubeId}?start=${sTime}&end=${eTime}&rel=0" allowfullscreen></iframe>
                    </div>
                    <div class="clip-info">
                        <div class="info-row">
                            <span class="label">Video Link:</span> 
                            <a href="${ytUrl}" target="_blank" class="value link">${ytUrl}</a>
                        </div>
                        <div class="info-row">
                            <span class="label">Clip Segment:</span> 
                            <span class="value">${s.start} — ${s.end}</span>
                        </div>
                    </div>
                    <button class="pop-btn" onclick="openPopup('${s.youtubeId}', ${sTime}, ${eTime})">Play in External Window</button>
                </div>
            </div>` : ``}
        </div>
    </div>`;
    }).join('');

    // Updated template with a 'no-video' CSS helper
    const finalDoc = `
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><title>Presentation</title>
    <style>
        :root{ --gold:#d4af37; --bg:#050b16; --text:#f5f1e8; --line:rgba(212,175,55,0.22); }
        body, html { margin:0; height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:Georgia, serif; }
        .slide-screen { display:none; height:100vh; width:100vw; box-sizing:border-box; padding:40px; }
        .slide-screen.active { display:flex; align-items:center; justify-content:center; }
        .slide-content { display:grid; grid-template-columns:1fr 1fr; width:1280px; max-width:95%; height:85vh; border:1px solid var(--line); border-radius:24px; overflow:hidden; background:rgba(255,255,255,0.02); }
        
        /* NEW: Expand text if no video is present */
        .slide-content.no-video { grid-template-columns: 1fr; max-width: 800px; }
        
        .panel { padding:40px; overflow-y:auto; }
        .panel + .panel { border-left:1px solid var(--line); background:rgba(0,0,0,0.2); }
        .eyebrow { color:var(--gold); text-transform:uppercase; font-size:12px; font-weight:bold; letter-spacing:2px; margin-bottom:10px; }
        h1 { font-size:2.8rem; margin:0 0 20px; color:#fff; }
        .quote { padding:15px; border-left:4px solid var(--gold); background:rgba(212,175,55,0.1); font-style:italic; margin-top:20px; }
        .video-container { height:100%; display:flex; flex-direction:column; justify-content:center; gap:15px; }
        .iframe-wrap { aspect-ratio:16/9; width:100%; border:1px solid var(--line); border-radius:12px; overflow:hidden; }
        iframe { width:100%; height:100%; border:0; }
        .clip-info { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; font-family: monospace; font-size: 0.85rem; }
        .info-row { margin-bottom: 5px; display: flex; gap: 10px; }
        .label { color: var(--gold); min-width: 90px; }
        .value { color: #aaa; word-break: break-all; }
        .pop-btn { background:var(--gold); border:none; padding:12px; border-radius:30px; font-weight:bold; cursor:pointer; }
        .nav-controls { position:fixed; bottom:30px; right:40px; display:flex; gap:15px; z-index:100; }
        .nav-btn { background:rgba(255,255,255,0.1); color:white; border:1px solid var(--line); padding:10px 25px; border-radius:5px; cursor:pointer; }
        .counter { position:fixed; bottom:35px; left:40px; color:var(--gold); opacity:0.6; }
    </style>
</head>
<body>
    ${slidesContent}
    <div class="counter" id="progress">Slide 1 / ${slides.length}</div>
    <div class="nav-controls">
        <button class="nav-btn" onclick="changeSlide(-1)">← Previous</button>
        <button class="nav-btn" onclick="changeSlide(1)">Next →</button>
    </div>
    <script>
        let current = 0;
        const total = ${slides.length};
        function changeSlide(dir) {
            document.getElementById('slide-' + current).classList.remove('active');
            current = (current + dir + total) % total;
            document.getElementById('slide-' + current).classList.add('active');
            document.getElementById('progress').innerText = 'Slide ' + (current + 1) + ' / ' + total;
        }
        function openPopup(id, s, e) {
            window.open('https://www.youtube.com/embed/'+id+'?start='+s+'&end='+e+'&autoplay=1', 'player', 'width=900,height=500');
        }
    <\/script>
</body>
</html>`;

    const link = document.createElement('a');
    link.href = URL.createObjectURL(new Blob([finalDoc], {type:'text/html'}));
    link.download = "presentation.html";
    link.click();
}
    // Initial empty slide
    addSlide();
</script>
</body>
</html>
